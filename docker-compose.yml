version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: factory_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env          # <-- your Atlas URI goes here
    environment:
      - PORT=8000
      - NODE_ENV=production
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD","node","-e","require('http').get('http://localhost:8000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: factory_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

# No MongoDB container — using Atlas cloud
